<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Huỳnh Nguyễn Hoàng</title>
    <link rel="stylesheet" href="cv.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="cv-container">
        <div class="left-column">
            <div class="profile-header">
                <div class="avatar">
                    <img src="avatar.jpg" alt="Avatar của Hoàng">
                </div>
                <h1 class="name">HUỲNH NGUYỄN HOÀNG</h1>
                <p class="job-title">Lập trình viên Backend</p>
            </div>
            <div class="sidebar-section">
                <div class="contact-item"><i class="fas fa-phone"></i> 0123 456 789</div>
                <div class="contact-item"><i class="fas fa-envelope"></i> hoang.huynh@vanlanguni.vn</div>
                <div class="contact-item"><i class="fas fa-map-marker-alt"></i> TP. Hồ Chí Minh</div>
            </div>
            <div class="sidebar-section">
                <h3>KỸ NĂNG</h3>
                <div class="skill-bar">
                    <span>Giao tiếp</span>
                    <div class="progress"><div class="fill" style="width: 85%;"></div></div>
                </div>
            </div>
        </div>
        <div class="right-column">
            <div class="main-section">
                <h2 class="section-title"><i class="fas fa-graduation-cap"></i> HỌC VẤN</h2>
                <div class="experience-item">
                    <strong>Đại học Văn Lang</strong> (2024 - Hiện tại)
                    <p>Chuyên ngành: Công nghệ thông tin</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
